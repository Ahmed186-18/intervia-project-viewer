<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Data Dashboard - Intervia</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS to parse Excel files -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- CryptoJS for Encryption -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <!-- Header (No Settings Button) -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2">
                    <!-- Ensure logo.png is in the same directory -->
                    <img src="logo.png" alt="Intervia Logo" class="h-10 w-auto object-contain" onerror="this.style.display='none'">
                    <span class="font-bold text-teal-700 text-xl tracking-wider hidden sm:block">INTERVIA</span>
                </div>
                <div class="h-6 w-px bg-gray-300 mx-1 hidden sm:block"></div>
                <div>
                    <h1 class="text-lg font-bold text-gray-900" id="headerTitle">Live Employee Dashboard</h1>
                    <p class="text-xs text-gray-500">Direct Shared Link</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <!-- Connection Status Banner -->
        <div id="statusBanner" class="hidden mb-6 p-4 rounded-xl flex items-center justify-between transition-all duration-300">
            <div class="flex items-center gap-3">
                <div id="statusIcon" class="p-2 rounded-full"></div>
                <div>
                    <h3 class="font-semibold text-sm" id="statusTitle">Checking...</h3>
                    <p class="text-xs opacity-90" id="statusDesc"></p>
                </div>
            </div>
            <button id="retryBtn" class="hidden text-sm underline font-semibold">Retry</button>
        </div>

        <!-- Dashboard View -->
        <div id="dashboardView" class="space-y-6">
            <!-- Search Bar -->
            <div class="bg-white p-4 rounded-xl border border-gray-200 flex flex-col sm:flex-row gap-4 justify-between items-center shadow-sm">
                <div class="relative w-full sm:w-96">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                        <i data-lucide="search" class="w-5 h-5"></i>
                    </span>
                    <input type="text" id="searchInput" placeholder="Search live data..." class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-sm">
                </div>
                <div class="flex flex-wrap items-center gap-3 text-xs text-gray-500 w-full sm:w-auto justify-end">
                    <span class="flex items-center gap-1">
                        <i data-lucide="refresh-cw" class="w-3.5 h-3.5 animate-spin hidden" id="spinIcon"></i>
                        <span id="lastUpdatedText">Loading...</span>
                    </span>
                </div>
            </div>

            <!-- Live Data Table -->
            <div class="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm">
                <div class="overflow-x-auto max-h-[70vh] overflow-y-auto">
                    <table class="w-full text-left border-collapse table-fixed" id="dataTable">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-200 text-gray-600 text-xs font-bold tracking-wider sticky top-0 z-10 shadow-sm">
                                <!-- Dynamic Headers go here -->
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 text-sm">
                            <tr>
                                <td colspan="100%" class="text-center py-12 text-gray-400">
                                    <div class="flex flex-col items-center gap-3">
                                        <i data-lucide="database" class="w-12 h-12 text-gray-300"></i>
                                        <p class="font-semibold text-gray-600">Loading Data...</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="bg-gray-50 px-6 py-4 border-t border-gray-100 flex items-center justify-between text-xs text-gray-500">
                    <span id="rowCountText">Rows displayed: 0</span>
                    <span class="flex items-center gap-1">
                        <i data-lucide="info" class="w-3.5 h-3.5"></i>
                        <span>Displaying sheet 2 of the Excel file</span>
                    </span>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-100 py-4 text-center text-xs text-gray-400">
        <p>© 2026 Intervia. All rights reserved.</p>
    </footer>

    <script>
        // ============================================================
        // 🔥🔥  تعديل الإعدادات هنا (عدل هذه القيم فقط قبل الرفع) 🔥🔥
        // ============================================================
        
        const CONFIG = {
            // 1. ضع رابط Dropbox الخاص بك هنا (رابط المشاركة العادي)
            DROPBOX_URL: "https://www.dropbox.com/s/xxxxxxxx/your_file.xlsx?dl=0",
            
            // 2. العنوان الذي سيظهر في أعلى الصفحة
            DASHBOARD_TITLE: "Live Employee Dashboard",
            
            // 3. أرقام الأعمدة التي تريد إظهارها (مثال: 1, 3, 5). اتركها فارغة [] لإظهار الكل
            VISIBLE_COLUMNS: [3, 4, 6], 
            
            // 4. أسماء مخصصة للأعمدة بالترتيب (اختياري)
            CUSTOM_COLUMN_NAMES: ["Project ID", "Project Name", "Clinet Name"]
        };
        
        // ============================================================
        // بقية الكود يعمل تلقائياً ولا تحتاج لتعديله
        // ============================================================

        // Encryption Setup (Hidden from user)
        const SECRET_KEY = 'Intervia2026SecureKey!@#$%';
        function encryptText(text) { return CryptoJS.AES.encrypt(text, SECRET_KEY).toString(); }
        function decryptText(ciphertext) { 
            try { return CryptoJS.AES.decrypt(ciphertext, SECRET_KEY).toString(CryptoJS.enc.Utf8); } 
            catch (e) { return ''; } 
        }

        let appConfig = {
            dropboxUrl: '',
            dashboardTitle: CONFIG.DASHBOARD_TITLE,
            visibleColumns: CONFIG.VISIBLE_COLUMNS,
            customColumnNames: CONFIG.CUSTOM_COLUMN_NAMES,
            pin: ''
        };
        let rawExcelData = [];

        const headerTitle = document.getElementById('headerTitle');
        const spinIcon = document.getElementById('spinIcon');
        const lastUpdatedText = document.getElementById('lastUpdatedText');
        const dataTable = document.getElementById('dataTable');
        const searchInput = document.getElementById('searchInput');
        const rowCountText = document.getElementById('rowCountText');
        const statusBanner = document.getElementById('statusBanner');
        const statusIcon = document.getElementById('statusIcon');
        const statusTitle = document.getElementById('statusTitle');
        const statusDesc = document.getElementById('statusDesc');
        const retryBtn = document.getElementById('retryBtn');

        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            initApp();
        });

        function initApp() {
            // Load from LocalStorage (just in case, but we force the hardcoded values)
            const saved = localStorage.getItem('intervia_dashboard_config');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    appConfig.dropboxUrl = decryptText(parsed.dropboxUrl) || CONFIG.DROPBOX_URL;
                } catch (e) {}
            }
            
            // Force the hardcoded URL if not saved or empty
            if (!appConfig.dropboxUrl) {
                appConfig.dropboxUrl = CONFIG.DROPBOX_URL;
                // Save it encrypted for next time
                const payload = {
                    dropboxUrl: encryptText(appConfig.dropboxUrl),
                    pin: '',
                    dashboardTitle: appConfig.dashboardTitle,
                    visibleColumns: appConfig.visibleColumns,
                    customColumnNames: appConfig.customColumnNames
                };
                localStorage.setItem('intervia_dashboard_config', JSON.stringify(payload));
            }

            headerTitle.textContent = appConfig.dashboardTitle;
            if (appConfig.dropboxUrl) {
                fetchAndRenderData();
            }
        }

        function convertToDirectLink(url) {
            try {
                let directUrl = url.trim();
                let urlObj = new URL(directUrl);
                if (urlObj.hostname === 'www.dropbox.com' || urlObj.hostname === 'dropbox.com') {
                    urlObj.hostname = 'dl.dropboxusercontent.com';
                }
                urlObj.searchParams.set('dl', '1');
                return urlObj.toString();
            } catch (e) {
                let fallback = url.trim();
                fallback = fallback.replace('www.dropbox.com', 'dl.dropboxusercontent.com');
                if (fallback.includes('dl=0')) fallback = fallback.replace('dl=0', 'dl=1');
                else if (!fallback.includes('dl=1')) fallback += (fallback.includes('?') ? '&' : '?') + 'dl=1';
                return fallback;
            }
        }

        async function fetchAndRenderData() {
            if (!appConfig.dropboxUrl) return;

            showLoadingState(true);
            showStatus('loading', 'Fetching data from Dropbox...', 'Connecting securely.');

            const directLink = convertToDirectLink(appConfig.dropboxUrl);
            let rawDataBuffer = null;
            let success = false;
            let lastErrorMessage = '';

            const fetchAttempts = [
                async () => { const res = await fetch(directLink); if (!res.ok) throw new Error(`Status: ${res.status}`); return await res.arrayBuffer(); },
                async () => { const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(directLink)}`; const res = await fetch(proxyUrl); if (!res.ok) throw new Error(`Proxy failed: ${res.status}`); return await res.arrayBuffer(); },
                async () => { const proxyUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(directLink)}`; const res = await fetch(proxyUrl); if (!res.ok) throw new Error(`Proxy failed: ${res.status}`); return await res.arrayBuffer(); }
            ];

            for (let i = 0; i < fetchAttempts.length; i++) {
                try {
                    const buffer = await fetchAttempts[i]();
                    if (buffer && buffer.byteLength > 1000) { rawDataBuffer = buffer; success = true; break; }
                } catch (e) { console.warn(`Attempt ${i+1} failed:`, e.message); lastErrorMessage = e.message; }
            }

            try {
                if (!success || !rawDataBuffer) throw new Error(`Unable to connect. Share link must be public. Details: (${lastErrorMessage})`);
                
                const data = new Uint8Array(rawDataBuffer);
                const workbook = XLSX.read(data, { type: 'array' });
                const targetSheetName = workbook.SheetNames[1] || workbook.SheetNames[0];
                const worksheet = workbook.Sheets[targetSheetName];
                rawExcelData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                
                if (rawExcelData.length === 0) throw new Error('File is empty.');
                renderTable(rawExcelData);
                showStatus('success', 'Connected & Synced', 'Data loaded successfully.');
                lastUpdatedText.textContent = `Last Update: ${new Date().toLocaleTimeString('en-US')}`;
            } catch (error) {
                console.error("Dashboard error:", error);
                showStatus('error', 'Data Fetch Error', error.message);
            } finally {
                showLoadingState(false);
            }
        }

        function renderTable(rows, filterText = '') {
            const thead = dataTable.querySelector('thead tr');
            const tbody = dataTable.querySelector('tbody');
            thead.innerHTML = '';
            tbody.innerHTML = '';

            if (rows.length === 0) {
                tbody.innerHTML = `<tr><td colspan="100%" class="text-center py-12 text-gray-400">No data available</td></tr>`;
                rowCountText.textContent = 'Rows displayed: 0';
                return;
            }

            const excelHeaderRow = rows[0] || [];
            const visibleIndices = appConfig.visibleColumns.map(num => parseInt(num) - 1).filter(i => !isNaN(i));

            visibleIndices.forEach((colIndex, idx) => {
                const th = document.createElement('th');
                th.className = 'px-6 py-4 text-sm font-semibold text-gray-700 w-auto max-w-[300px] truncate';
                const customName = appConfig.customColumnNames[idx];
                const originalName = excelHeaderRow[colIndex];
                th.textContent = customName || originalName || `Column ${colIndex + 1}`;
                th.title = th.textContent;
                thead.appendChild(th);
            });

            let matchCount = 0;
            const searchLower = filterText.toLowerCase().trim();

            for (let r = 1; r < rows.length; r++) {
                const row = rows[r];
                if (!row || row.length === 0 || row.every(val => val === undefined || val === '')) continue;

                const mappedRow = visibleIndices.map(colIndex => row[colIndex] !== undefined ? String(row[colIndex]) : '');

                if (searchLower) {
                    const matchesSearch = mappedRow.some(cellText => cellText.toLowerCase().includes(searchLower));
                    if (!matchesSearch) continue;
                }

                matchCount++;
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50/50 transition-colors';

                mappedRow.forEach(cellText => {
                    const td = document.createElement('td');
                    td.className = 'px-6 py-4 text-gray-600 border-b border-gray-100 whitespace-normal break-words max-w-[300px] min-w-[100px]';
                    
                    if (cellText === 'Completed' || cellText === 'Done' || cellText === 'Success' || cellText === 'مكتمل') {
                        td.innerHTML = `<span class="bg-green-50 text-green-700 px-2.5 py-1 rounded-full text-xs font-semibold border border-green-200 whitespace-nowrap inline-block">${cellText}</span>`;
                    } else if (cellText === 'Processing' || cellText === 'Active' || cellText === 'In Progress' || cellText === 'قيد المعالجة') {
                        td.innerHTML = `<span class="bg-blue-50 text-blue-700 px-2.5 py-1 rounded-full text-xs font-semibold border border-blue-200 whitespace-nowrap inline-block">${cellText}</span>`;
                    } else if (cellText === 'Cancelled' || cellText === 'Stopped' || cellText === 'ملغي') {
                        td.innerHTML = `<span class="bg-red-50 text-red-700 px-2.5 py-1 rounded-full text-xs font-semibold border border-red-200 whitespace-nowrap inline-block">${cellText}</span>`;
                    } else {
                        td.textContent = cellText;
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            }

            if (matchCount === 0) {
                tbody.innerHTML = `<tr><td colspan="100%" class="text-center py-12 text-gray-400">No results match your search</td></tr>`;
            }
            rowCountText.textContent = `Rows displayed: ${matchCount}`;
            lucide.createIcons();
        }

        searchInput.addEventListener('input', (e) => { renderTable(rawExcelData, e.target.value); });

        function showStatus(type, title, desc) {
            statusBanner.classList.remove('hidden', 'bg-blue-50', 'text-blue-800', 'bg-green-50', 'text-green-800', 'bg-red-50', 'text-red-800');
            statusIcon.innerHTML = '';
            retryBtn.classList.add('hidden');
            if (type === 'loading') {
                statusBanner.classList.add('bg-blue-50', 'text-blue-800');
                statusIcon.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>`;
            } else if (type === 'success') {
                statusBanner.classList.add('bg-green-50', 'text-green-800');
                statusIcon.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5"></i>`;
            } else if (type === 'error') {
                statusBanner.classList.add('bg-red-50', 'text-red-800');
                statusIcon.innerHTML = `<i data-lucide="alert-triangle" class="w-5 h-5"></i>`;
                retryBtn.classList.remove('hidden');
                retryBtn.textContent = 'Retry Connection';
                retryBtn.onclick = fetchAndRenderData;
            }
            statusTitle.textContent = title;
            statusDesc.textContent = desc;
            lucide.createIcons();
        }

        function showLoadingState(isLoading) {
            if (isLoading) spinIcon.classList.remove('hidden');
            else spinIcon.classList.add('hidden');
        }
    </script>
</body>
</html>
